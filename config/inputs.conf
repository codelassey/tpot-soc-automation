# T-Pot Honeypot - Splunk Universal Forwarder inputs.conf
# Base path: /home/<user>/tpotce/data/ (You have to change this to the location where tpot runs from)
# Generated for all honeypot services
# By Prince Lassey.. during one of my cybersecurity projects
# I did not add some honeypots tho since they had no data but if you have that data, you can equally add that honeypot to the list of files monitored

[monitor:///home/apostrophe/tpotce/data/adbhoney/log]
disabled = false
index = honeypot
sourcetype = adbhoney
followTail = 0
crcSalt = <SOURCE>
whitelist = \.(csv|log|json|gz)(\.\d+)?$


